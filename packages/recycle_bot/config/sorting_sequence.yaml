# YAML defining sorting target locations and neutral pose
# defined as a conjunction of a position and orientation in reference to base_link:
# - position: cartesian coordinates (meters) - consistent with MoveIt
# - orientation: quaternion [x, y, z, w]

# neutral pose: safe position above workspace for transit between pick and place
# robot moves here after gripping before moving to place location
neutral_pose:
  position: [-0.521, 0.474, 0.344]  # centered, elevated (meters)
  orientation: [0.691287034033189, 0.7225793866612643, -0.0010909763948931102, 0.000276261350695787]  # face-down (180° around Y)

# joint-space neutral (preferred for safe, deterministic motion)
neutral_joint_pose:
  shoulder_pan_joint: -2.91
  shoulder_lift_joint: -1.54
  elbow_joint: -2.28
  wrist_1_joint: -0.89
  wrist_2_joint: 1.57
  wrist_3_joint: -4.08

  # neutral_joint_pose:
  # shoulder_pan_joint: -1.92
  # shoulder_lift_joint: -1.82
  # elbow_joint: -1.91
  # wrist_1_joint: -0.96
  # wrist_2_joint: 1.57
  # wrist_3_joint: -3.19

# joint-space pose under the camera (waypoint before descending to pick)
under_camera_pose:
  shoulder_pan_joint: -3.40
  shoulder_lift_joint: -1.72
  elbow_joint: -2.22
  wrist_1_joint: -0.77
  wrist_2_joint: 1.57
  wrist_3_joint: -4.57

# sorting bin locations
sorting_sequence:
  - target_bin_1: { position: [0.425, -0.391, 0.487], orientation: [1.0, 0.0, 0.0, 0.0] }
#  - target_bin_2: { position: [x2, y2, z2], orientation: [qx2, qy2, qz2, qw2] }
#  - target_bin_3: { position: [x3, y3, z3], orientation: [qx3, qy3, qz3, qw3] }

cycle: true  # cycle through targets when end is reached
approach_height_m: 0.05  # meters above pick/place for approach/retreat
grasped_object_size: [0.05, 0.05, 0.05]  # meters (box attached to tool for planning)

# small vertical clearance added to the detected pick height (meters).
# the vision pipeline tends to report the object surface slightly too low (depth
# averaging over the bbox + calibration error), so the robot over-travels by ~1cm
# and squishes the object. This raises the pick pose to compensate.
# increase if it still presses too hard, decrease if it stops short of the object.
pick_z_offset_m: 0.01

# TCP orientation constraint applied to the carry transit moves (Steps 6 & 7)
# so a grasped object does not tip onto its side mid-transit. Per-axis tolerances
# are radians of allowed divergence from tool-down. ~3.14 = free, 0 = locked.
# x/y are kept loose (~28 deg) on purpose: tight enough to stop the object tipping
# over, loose enough that constrained OMPL planning stays fast/reliable. z is free
# (the object may spin about the vertical — that does not tip it).
# Note: only OMPL planners honor this; Pilz PTP/LIN ignore it.
orientation_constraint:
  enabled: true
  link_name: "tool0"
  absolute_x_axis_tolerance: 0.5
  absolute_y_axis_tolerance: 0.5
  absolute_z_axis_tolerance: 3.14
  weight: 1.0
